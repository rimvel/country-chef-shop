<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Country Chef · Administravimas</title>
<style>
  :root{
    --bg:#f6f1e7;--paper:#fffdf8;--ink:#231a14;--muted:#7a6b5b;--line:#e7ddcc;
    --brand:#b5431f;--brand-dark:#8f3216;--accent:#2f6b4f;--gold:#c98a2b;
    --shadow:0 10px 30px rgba(60,40,20,.12);--radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px}
  header{background:var(--ink);color:#f3e9d8;position:sticky;top:0;z-index:20}
  header .wrap{display:flex;align-items:center;gap:12px;height:60px}
  header .mark{width:34px;height:34px;border-radius:9px;background:radial-gradient(circle at 30% 25%,#d96a3c,var(--brand-dark));display:grid;place-items:center;font-size:18px}
  header b{font-size:16px}
  header .sp{margin-left:auto}
  header button{border:0;background:#3a2a1d;color:#f3e9d8;font-weight:600;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer}
  header button:hover{background:#4a3626}
  header button.primary{background:var(--brand)}
  header button.primary:hover{background:var(--brand-dark)}

  /* Login */
  .login{max-width:420px;margin:60px auto;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
  .login h1{font-size:20px;margin:0 0 4px}
  .login p{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  label.fld{display:block;font-size:12.5px;font-weight:700;margin-bottom:14px}
  label.fld span.req{color:var(--brand)}
  label.fld input,label.fld textarea,label.fld select{width:100%;margin-top:6px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff}
  label.fld input:focus,label.fld textarea:focus,label.fld select:focus{outline:2px solid var(--brand);border-color:transparent}
  .btn{border:0;background:var(--brand);color:#fff;font-weight:800;font-size:14.5px;padding:12px 16px;border-radius:10px;cursor:pointer;width:100%}
  .btn:hover{background:var(--brand-dark)}
  .btn.green{background:var(--accent)}
  .btn.ghost{background:#efe6d6;color:var(--ink)}
  .err{color:var(--brand);font-size:13px;font-weight:700;margin-top:10px;min-height:18px}

  /* Toolbar + list */
  main{padding:22px 0 60px}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .bar h2{margin:0;font-size:20px}
  .bar .count{color:var(--muted);font-size:13px}
  .bar .sp{margin-left:auto}
  .bar button{border:0;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13.5px;cursor:pointer}
  .bar .add{background:var(--accent);color:#fff}
  .bar .refresh{background:#efe6d6;color:var(--ink)}

  .list{display:flex;flex-direction:column;gap:10px}
  .item{display:flex;gap:12px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px}
  .item.hidden{opacity:.55}
  .item .thumb{width:54px;height:54px;border-radius:9px;background:#f3e7d3;display:grid;place-items:center;overflow:hidden;flex-shrink:0;font-size:24px}
  .item .thumb img{width:100%;height:100%;object-fit:cover}
  .item .info{min-width:0;flex:1}
  .item .info b{display:block;font-size:14.5px;line-height:1.2}
  .item .info small{color:var(--muted);font-size:12px}
  .item .price{font-weight:800;color:var(--brand-dark);white-space:nowrap;font-size:15px}
  .item .actions{display:flex;gap:6px;flex-shrink:0}
  .item .actions button{border:0;border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:700;cursor:pointer}
  .a-edit{background:#e9ecff;color:#33409e}
  .a-toggle{background:#fff0d6;color:#9a6a12}
  .a-del{background:#ffe1da;color:var(--brand-dark)}
  .badge{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .badge.off{background:#e7ddcc;color:#7a6b5b}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(35,26,20,.55);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:20px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--paper);width:100%;max-width:560px;border-radius:16px;box-shadow:var(--shadow);margin:auto}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:18px}
  .modal-head .x{border:0;background:none;font-size:24px;cursor:pointer;color:var(--muted)}
  .modal form{padding:18px 20px 22px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  @media(max-width:520px){.row2{grid-template-columns:1fr}}
  .modal .imgprev{height:120px;border-radius:10px;background:#f3e7d3;display:grid;place-items:center;overflow:hidden;margin-bottom:12px;font-size:30px}
  .modal .imgprev img{width:100%;height:100%;object-fit:cover}
  .opt{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;margin:4px 0 16px;cursor:pointer}
  .opt input{width:18px;height:18px;accent-color:var(--accent)}
  .modal .save{display:flex;gap:10px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .muted-note{font-size:12px;color:var(--muted);margin-top:14px;text-align:center}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #fff5;border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <span class="mark">🔥</span>
    <b>Country Chef · Administravimas</b>
    <span class="sp"></span>
    <button id="logoutBtn" style="display:none" onclick="logout()">Atsijungti</button>
  </div>
</header>

<!-- LOGIN -->
<div id="loginView" class="login">
  <h1>Prisijungimas</h1>
  <p>Įveskite katalogo API nuorodą ir admin slaptažodį.</p>
  <label class="fld">API nuoroda (Apps Script „Web app", baigiasi /exec) <span class="req">*</span>
    <input id="apiUrl" type="url" placeholder="https://script.google.com/macros/s/AKfyc..../exec">
  </label>
  <label class="fld">Slaptažodis <span class="req">*</span>
    <input id="pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </label>
  <button class="btn" id="loginBtn" onclick="login()">Prisijungti</button>
  <div class="err" id="loginErr"></div>
  <div class="muted-note">Slaptažodis nustatomas Apps Script „Script properties → ADMIN_TOKEN".</div>
</div>

<!-- APP -->
<main id="appView" class="wrap" style="display:none">
  <div class="bar">
    <h2>Gaminiai</h2>
    <span class="count" id="count"></span>
    <span class="sp"></span>
    <button class="refresh" onclick="reload()">↻ Atnaujinti</button>
    <button class="add" onclick="openEdit(null)">＋ Naujas gaminys</button>
  </div>
  <div class="list" id="list"></div>
  <div class="muted-note">Pakeitimai įrašomi į Google Sheets ir iškart matomi parduotuvėje.</div>
</main>

<!-- EDIT / ADD MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Gaminys</h3>
      <button class="x" onclick="closeEdit()">×</button>
    </div>
    <form id="prodForm" onsubmit="return saveProduct(event)">
      <div class="imgprev" id="imgPrev">🍖</div>
      <label class="fld">Nuotraukos URL
        <input name="image" type="url" placeholder="https://... arba images/pavadinimas.jpg" oninput="updPrev()">
      </label>
      <div class="row2">
        <label class="fld">ID (raktas, be tarpų) <span class="req">*</span>
          <input name="id" required pattern="[a-zA-Z0-9_-]+" placeholder="pvz. sonine-pj">
        </label>
        <label class="fld">Atsarginė piktograma
          <input name="icon" placeholder="🍖" oninput="updPrev()">
        </label>
      </div>
      <label class="fld">Pavadinimas <span class="req">*</span>
        <input name="name" required placeholder="Gaminio pavadinimas">
      </label>
      <label class="fld">Trumpas aprašymas (po pavadinimu)
        <input name="short" placeholder="pvz. 1 kg pakuotė">
      </label>
      <label class="fld">Pilnas aprašymas / Sudėtis
        <textarea name="description" rows="3" placeholder="Sudėtis: ..."></textarea>
      </label>
      <div class="row2">
        <label class="fld">Kaina (€) <span class="req">*</span>
          <input name="price" required inputmode="decimal" placeholder="12.50">
        </label>
        <label class="fld">Kainos vnt. (prie kainos)
          <input name="unit" placeholder="/kg, /vnt., /pak.">
        </label>
        <label class="fld">Maks. kiekis
          <input name="max" type="number" min="1" placeholder="5">
        </label>
        <label class="fld">Matas (krepšelyje)
          <input name="ustep" placeholder="vnt., pak., juostos">
        </label>
        <label class="fld">Ženkliukas (ant nuotraukos)
          <input name="tag" placeholder="pvz. Karštai rūkyta">
        </label>
        <label class="fld">Ženkliuko spalva
          <select name="tagClass">
            <option value="">Žalia (numatyta)</option>
            <option value="hot">Raudona (hot)</option>
            <option value="gift">Auksinė (gift)</option>
          </select>
        </label>
      </div>
      <label class="opt"><input type="checkbox" name="active" checked> Rodoma parduotuvėje</label>
      <div class="save">
        <button type="button" class="btn ghost" onclick="closeEdit()">Atšaukti</button>
        <button type="submit" class="btn green" id="saveBtn">Išsaugoti</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = localStorage.getItem('cc_api') || '';
var TOKEN = sessionStorage.getItem('cc_token') || '';
var PRODUCTS = [];
var FIELDS = ['id','name','short','description','price','unit','max','ustep','tag','tagClass','icon','image','active'];

document.getElementById('apiUrl').value = API;

/* ---------- JSONP read (admin list, includes hidden) ---------- */
function fetchAdmin(api, token){
  return new Promise(function(resolve,reject){
    var cb='__adm_'+Date.now();
    var s=document.createElement('script');
    var t=setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 9000);
    function cleanup(){ clearTimeout(t); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=function(res){ cleanup(); resolve(res); };
    s.onerror=function(){ cleanup(); reject(new Error('network')); };
    s.src=api+(api.indexOf('?')>-1?'&':'?')+'admin=1&token='+encodeURIComponent(token)+'&callback='+cb+'&_='+Date.now();
    document.head.appendChild(s);
  });
}

/* ---------- POST write (no-cors) ---------- */
function postAction(params){
  var body=new URLSearchParams();
  body.set('token', TOKEN);
  Object.keys(params).forEach(function(k){ body.set(k, params[k]==null?'':params[k]); });
  return fetch(API, {method:'POST', mode:'no-cors', body:body});
}

/* ---------- Login ---------- */
function login(){
  var api=document.getElementById('apiUrl').value.trim();
  var pwd=document.getElementById('pwd').value;
  var err=document.getElementById('loginErr');
  var btn=document.getElementById('loginBtn');
  err.textContent='';
  if(!api || !pwd){ err.textContent='Užpildykite abu laukus.'; return; }
  btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  fetchAdmin(api, pwd).then(function(res){
    btn.innerHTML='Prisijungti'; btn.disabled=false;
    if(res && res.ok && res.admin){
      API=api; TOKEN=pwd;
      localStorage.setItem('cc_api', API);
      sessionStorage.setItem('cc_token', TOKEN);
      PRODUCTS=res.products||[];
      showApp();
    } else {
      err.textContent='Neteisingas slaptažodis arba API nuoroda.';
    }
  }).catch(function(){
    btn.innerHTML='Prisijungti'; btn.disabled=false;
    err.textContent='Nepavyko susisiekti su API. Patikrinkite nuorodą.';
  });
}
function logout(){ sessionStorage.removeItem('cc_token'); TOKEN=''; location.reload(); }

function showApp(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  document.getElementById('logoutBtn').style.display='inline-block';
  renderList();
}

/* ---------- List ---------- */
function reload(){
  toast('Atnaujinama…');
  fetchAdmin(API, TOKEN).then(function(res){
    if(res && res.ok){ PRODUCTS=res.products||[]; renderList(); toast('Atnaujinta'); }
    else toast('Nepavyko atnaujinti');
  }).catch(function(){ toast('Tinklo klaida'); });
}
function eur(n){ return (Number(n)||0).toLocaleString('lt-LT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function isOn(p){ return String(p.active).toLowerCase()!=='false'; }
function renderList(){
  var list=document.getElementById('list');
  document.getElementById('count').textContent='('+PRODUCTS.length+')';
  list.innerHTML='';
  PRODUCTS.forEach(function(p){
    var el=document.createElement('div');
    el.className='item'+(isOn(p)?'':' hidden');
    el.innerHTML=
      '<div class="thumb">'+(p.image?'<img src="'+esc(p.image)+'" onerror="this.parentNode.textContent=\''+(p.icon||'🍖')+'\'">':(p.icon||'🍖'))+'</div>'+
      '<div class="info"><b>'+esc(p.name||p.id)+(isOn(p)?'':'<span class="badge off">Paslėpta</span>')+'</b>'+
        '<small>'+esc(p.short||'')+'</small></div>'+
      '<div class="price">'+eur(p.price)+'<small style="color:var(--muted);font-weight:600"> '+esc(p.unit||'')+'</small></div>'+
      '<div class="actions">'+
        '<button class="a-edit" onclick="openEdit(\''+esc(p.id)+'\')">Keisti</button>'+
        '<button class="a-toggle" onclick="toggleProduct(\''+esc(p.id)+'\')">'+(isOn(p)?'Slėpti':'Rodyti')+'</button>'+
        '<button class="a-del" onclick="delProduct(\''+esc(p.id)+'\')">Trinti</button>'+
      '</div>';
    list.appendChild(el);
  });
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function byId(id){ return PRODUCTS.filter(function(p){return String(p.id)===String(id);})[0]; }

/* ---------- Edit / Add ---------- */
var editingId=null;
function openEdit(id){
  editingId=id;
  var f=document.getElementById('prodForm');
  f.reset();
  var p=id?byId(id):null;
  document.getElementById('modalTitle').textContent=p?('Redaguoti: '+(p.name||p.id)):'Naujas gaminys';
  FIELDS.forEach(function(k){
    if(k==='active') return;
    if(f[k]) f[k].value=p?(p[k]==null?'':p[k]):'';
  });
  f.active.checked=p?isOn(p):true;
  f.id.readOnly=!!p; // ID nekeičiamas redaguojant
  updPrev();
  document.getElementById('overlay').classList.add('open');
}
function closeEdit(){ document.getElementById('overlay').classList.remove('open'); }
function updPrev(){
  var f=document.getElementById('prodForm');
  var prev=document.getElementById('imgPrev');
  if(f.image.value.trim()) prev.innerHTML='<img src="'+esc(f.image.value.trim())+'" onerror="this.parentNode.textContent=\''+(f.icon.value||'🍖')+'\'">';
  else prev.textContent=f.icon.value||'🍖';
}
function saveProduct(e){
  e.preventDefault();
  var f=e.target;
  var data={ action: editingId?'update':'add' };
  FIELDS.forEach(function(k){
    if(k==='active'){ data.active=f.active.checked?'TRUE':'FALSE'; }
    else if(f[k]) data[k]=f[k].value.trim();
  });
  data.price=String(data.price).replace(',','.');
  var btn=document.getElementById('saveBtn');
  btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  var expectId=data.id;
  postAction(data).finally(function(){
    setTimeout(function(){
      fetchAdmin(API, TOKEN).then(function(res){
        btn.innerHTML='Išsaugoti'; btn.disabled=false;
        if(res && res.ok){
          PRODUCTS=res.products||[]; renderList();
          var saved=byId(expectId);
          if(saved){ closeEdit(); toast(editingId?'Pakeitimai išsaugoti':'Gaminys pridėtas'); }
          else toast('Neišsaugota. Patikrinkite slaptažodį / ID.');
        } else { btn.innerHTML='Išsaugoti'; btn.disabled=false; toast('Klaida atnaujinant'); }
      }).catch(function(){ btn.innerHTML='Išsaugoti'; btn.disabled=false; toast('Tinklo klaida'); });
    }, 1700);
  });
  return false;
}
function toggleProduct(id){
  toast('Keičiama…');
  postAction({action:'toggle', id:id}).finally(function(){ setTimeout(reload, 1500); });
}
function delProduct(id){
  var p=byId(id);
  if(!confirm('Ištrinti „'+((p&&p.name)||id)+'"? Veiksmo atšaukti negalėsite.')) return;
  toast('Trinama…');
  postAction({action:'delete', id:id}).finally(function(){ setTimeout(reload, 1500); });
}

/* ---------- misc ---------- */
function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
document.getElementById('overlay').addEventListener('click',function(e){ if(e.target.id==='overlay') closeEdit(); });

/* auto-login if token still in session */
if(API && TOKEN){
  fetchAdmin(API, TOKEN).then(function(res){
    if(res && res.ok && res.admin){ PRODUCTS=res.products||[]; showApp(); }
  }).catch(function(){});
}
</script>
</body>
</html>
